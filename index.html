<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="記事の核を400文字で置き、4つの画像パターンからアイキャッチをつくる。">
    <title>Make Eyecatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">MAKE EYECATCH</p>
        <h1>画像の雰囲気を、<br>先に決める。</h1>
        <p>本当に大事なことを400文字で置く。あとは、4つの型から一つ選ぶだけ。</p>
      </header>

      <section class="input-area" aria-labelledby="idea-label">
        <div class="section-heading"><span>01</span><h2 id="idea-label">記事の核</h2><small id="char-count">0 / 400</small></div>
        <textarea id="title-input" maxlength="400" rows="7" placeholder="この記事でいちばん残したいこと。読んだ人に何を感じてほしいか。画像で伝えたい空気。"></textarea>
        <label class="visual-hint" for="visual-hint-input"><span>画像の比喩（任意）</span><input id="visual-hint-input" maxlength="100" type="text" placeholder="例: 仏がにんじんについて考えている"><small>記事をそのまま描かず、画像の主役になる一場面を書く。</small></label>
      </section>

      <section class="style-area" aria-labelledby="style-label">
        <div class="section-heading"><span>02</span><h2 id="style-label">画像の型を選ぶ</h2><small>選んだ型は次回も残ります</small></div>
        <div id="style-options" class="style-grid">
          <button class="style-card" type="button" data-style="ukiyoe"><img src="./assets/reference-ukiyoe.png" alt="浮世絵の雰囲気"><strong>浮世絵</strong><small>物語と余白</small></button>
          <button class="style-card" type="button" data-style="original"><img src="./assets/reference-sharp.png" alt="シャープなエディトリアルの雰囲気"><strong>シャープなエディトリアル</strong><small>白・黒・藍</small></button>
          <button class="style-card" type="button" data-style="simple70s"><img src="./assets/reference-paper.png" alt="静かな紙の記録の雰囲気"><strong>静かな紙の記録</strong><small>手触りと静けさ</small></button>
          <button class="style-card" type="button" data-style="retro80s"><img src="./assets/reference-poster.png" alt="鮮やかなポスターの雰囲気"><strong>鮮やかなポスター</strong><small>強い一瞬</small></button>
        </div>
      </section>

      <section class="action-area">
        <button id="generate-button" class="primary-button" type="button">この型でプロンプトを作る <span>→</span></button>
        <p id="selected-style">浮世絵を選択中</p><a id="reference-link" href="./assets/reference-ukiyoe.png" target="_blank" rel="noopener">見本画像を開く（生成時に添付）↗</a>
      </section>

      <section class="output" aria-live="polite">
        <div class="output-header"><p class="eyebrow">PROMPT</p><h2>画像をつくる言葉</h2></div>
        <pre id="prompt-output">記事の核と画像の型を選ぶと、ここにプロンプトが出ます。</pre>
        <div class="output-actions"><button id="copy-button" type="button">プロンプトをコピー</button><button id="chatgpt-button" type="button">コピーしてChatGPTを開く ↗</button></div>
        <p id="copy-status" class="copy-status" aria-live="polite">生成後、ここからそのままChatGPTへ貼り付けられます。</p>
        <ol class="handoff-steps"><li><a id="output-reference-link" href="./assets/reference-ukiyoe.png" target="_blank" rel="noopener">見本画像を開く</a></li><li>画像生成AIに見本画像を添付する</li><li>コピーしたプロンプトを貼り付ける</li></ol>
      </section>
    </main>
    <script src="./js/config.js"></script>
    <script src="./js/prompt-engine.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/ui.js"></script>
  </body>
</html>
