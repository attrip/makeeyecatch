<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make Eyecatch Prompt Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Make Eyecatch</p>
        <h1>ブログタイトルからアイキャッチ用プロンプトを作るツール</h1>
      </section>

      <section class="panel controls">
        <div class="field-group">
          <label class="field-label" for="title-input">元のブログタイトル</label>
          <textarea
            id="title-input"
            class="textarea"
            rows="3"
            placeholder="ここに元のブログタイトルを入れる"
          ></textarea>
        </div>

        <div class="field-group">
          <span class="field-label">画像サイズ</span>
          <div class="chip-row" id="size-options">
            <label class="chip">
              <input type="radio" name="size" value="square" />
              <span>正方形 1:1</span>
            </label>
            <label class="chip">
              <input type="radio" name="size" value="wide" checked />
              <span>16:9</span>
            </label>
            <label class="chip">
              <input type="radio" name="size" value="portrait" />
              <span>縦長 4:5</span>
            </label>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="style-select">画像Style</label>
          <select id="style-select" class="select">
            <option value="ukiyoe">浮世絵</option>
            <option value="simple70s">70sシンプル</option>
          </select>
          <div class="inline-actions">
            <button id="add-style-button" class="secondary-button compact-button" type="button">Styleを追加</button>
          </div>
          <div id="style-preview" class="style-preview">
            <div class="style-preview-header">
              <strong id="style-preview-label">浮世絵</strong>
              <span id="style-preview-kind" class="style-preview-kind">Default Style</span>
            </div>
            <dl class="style-preview-list">
              <div>
                <dt>Look</dt>
                <dd id="style-preview-look">-</dd>
              </div>
              <div>
                <dt>Composition</dt>
                <dd id="style-preview-composition">-</dd>
              </div>
              <div>
                <dt>Texture</dt>
                <dd id="style-preview-texture">-</dd>
              </div>
              <div>
                <dt>Color</dt>
                <dd id="style-preview-color">-</dd>
              </div>
              <div>
                <dt>Mood</dt>
                <dd id="style-preview-mood">-</dd>
              </div>
              <div>
                <dt>Negative</dt>
                <dd id="style-preview-negative">-</dd>
              </div>
            </dl>
          </div>
          <div id="custom-style-status" class="custom-style-status" hidden></div>
          <div id="custom-style-panel" class="custom-style-panel" hidden>
            <p id="custom-style-source" class="helper-text"></p>
            <div class="field-group">
              <label class="field-label" for="custom-style-label">Style名</label>
              <input id="custom-style-label" class="text-input" type="text" placeholder="例: 水彩ポスター" />
            </div>
            <div class="field-group">
              <label class="field-label" for="custom-style-look">Look</label>
              <textarea id="custom-style-look" class="textarea compact-textarea" rows="2" placeholder="見た目の方向性"></textarea>
            </div>
            <div class="field-group">
              <label class="field-label" for="custom-style-composition">Composition</label>
              <textarea id="custom-style-composition" class="textarea compact-textarea" rows="2" placeholder="構図ルール"></textarea>
            </div>
            <div class="field-group">
              <label class="field-label" for="custom-style-texture">Texture</label>
              <textarea id="custom-style-texture" class="textarea compact-textarea" rows="2" placeholder="質感ルール"></textarea>
            </div>
            <div class="field-group">
              <label class="field-label" for="custom-style-color">Color</label>
              <textarea id="custom-style-color" class="textarea compact-textarea" rows="2" placeholder="色ルール"></textarea>
            </div>
            <div class="field-group">
              <label class="field-label" for="custom-style-mood">Mood</label>
              <textarea id="custom-style-mood" class="textarea compact-textarea" rows="2" placeholder="雰囲気ルール"></textarea>
            </div>
            <div class="field-group">
              <label class="field-label" for="custom-style-negative">Negative</label>
              <textarea id="custom-style-negative" class="textarea compact-textarea" rows="2" placeholder="除外したい要素"></textarea>
            </div>
            <div class="inline-actions">
              <button id="save-style-button" class="primary-button compact-button" type="button">保存する</button>
            </div>
          </div>
          <div id="custom-style-list" class="saved-style-list"></div>
        </div>

        <div class="field-group">
          <span class="field-label">文字の扱い</span>
          <div class="chip-row">
            <label class="chip">
              <input type="radio" name="textPolicy" value="noText" checked />
              <span>文字なし</span>
            </label>
            <label class="chip">
              <input type="radio" name="textPolicy" value="unspecified" />
              <span>未指定</span>
            </label>
          </div>
        </div>

        <div class="actions">
          <button id="generate-button" class="primary-button" type="button">生成する</button>
          <button id="copy-button" class="secondary-button" type="button">コピー</button>
          <button id="chatgpt-button" class="secondary-button" type="button">ChatGPTで開く</button>
          <button id="gemini-button" class="secondary-button" type="button">Geminiで開く</button>
        </div>
      </section>

      <section class="panel output">
        <div class="output-header">
          <div>
            <p class="eyebrow">Prompt</p>
            <h2>完成プロンプト</h2>
          </div>
          <div id="meta-badges" class="meta-badges"></div>
        </div>

        <div class="output-grid">
          <article class="output-card">
            <h3>Prompt</h3>
            <pre id="prompt-output" class="code-block">タイトルを入れて生成してください。</pre>
          </article>

          <article class="output-card">
            <h3>解釈メモ</h3>
            <dl class="summary-list">
              <div>
                <dt>元タイトル</dt>
                <dd id="title-output">未生成</dd>
              </div>
              <div>
                <dt>主題</dt>
                <dd id="subject-output">未生成</dd>
              </div>
              <div>
                <dt>1モチーフ</dt>
                <dd id="motif-output">未生成</dd>
              </div>
              <div>
                <dt>雰囲気</dt>
                <dd id="mood-output">未生成</dd>
              </div>
              <div>
                <dt>構図</dt>
                <dd id="composition-output">未生成</dd>
              </div>
              <div>
                <dt>分類</dt>
                <dd id="category-output">未生成</dd>
              </div>
            </dl>
          </article>
        </div>
      </section>
    </main>

    <script src="./js/config.js"></script>
    <script src="./js/prompt-engine.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/ui.js"></script>
  </body>
</html>
